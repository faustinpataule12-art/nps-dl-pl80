name: Agent Download
on: [push]
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install yt-dlp & ffmpeg
        run: |
          sudo apt-get install -y ffmpeg 2>/dev/null || true
          pip install yt-dlp requests 2>/dev/null || true
      - name: Download
        run: python downloader.py
        env:
          TARGET_URL: "https://youtu.be/dQw4w9WgXcQ"
          MODE: "video"
      - name: Upload result
        uses: actions/upload-artifact@v3
        with:
          name: download-result
          path: output/
